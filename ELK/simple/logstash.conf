input {
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  # 示例过滤器：添加时间戳
  mutate {
    add_field => { "received_at" => "%{@timestamp}" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "demo-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
